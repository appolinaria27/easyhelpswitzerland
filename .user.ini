; Production PHP settings — hide errors from users, log them to file
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL
log_errors = On
error_log = /tmp/easyhelpswiss-errors.log

; Session security
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Execution limits
max_execution_time = 30
memory_limit = 64M
post_max_size = 2M
upload_max_filesize = 1M
