<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Easy Help Switzerland</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Manrope",system-ui,sans-serif;background:#0a0e14;color:#e8edf2;min-height:100vh}
    :root{--blue:#4693e8;--line:rgba(255,255,255,.1);--card:rgba(255,255,255,.05)}

    /* ── Login ── */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .login-card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
    .login-card h1{font-size:22px;color:#111;margin-bottom:6px}
    .login-card p{font-size:14px;color:#888;margin-bottom:28px}
    .login-card input{width:100%;border:1px solid #ddd;border-radius:10px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;transition:.2s}
    .login-card input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(70,147,232,.15)}
    .login-card button{width:100%;margin-top:14px;background:var(--blue);color:#fff;border:0;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
    .login-card button:hover{background:#317bcd}
    .login-error{margin-top:12px;font-size:13px;color:#c00;text-align:center;display:none}

    /* ── Dashboard ── */
    #dashboard{display:none;padding:32px 24px;max-width:1100px;margin:0 auto}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
    .top-bar h1{font-size:22px;font-weight:600}
    .logout-btn{background:transparent;border:1px solid var(--line);color:rgba(255,255,255,.6);border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
    .logout-btn:hover{border-color:#fff;color:#fff}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
    .stat-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 20px}
    .stat-card .num{font-size:36px;font-weight:700;color:var(--blue)}
    .stat-card .lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:4px}

    .section-title{font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:14px}

    .entry-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:12px}
    .entry-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-radius:6px;padding:3px 10px;font-weight:600}
    .badge-free{background:rgba(70,147,232,.15);color:#4693e8}
    .badge-paid{background:rgba(46,204,113,.15);color:#2ecc71}
    .badge-pending{background:rgba(243,156,18,.15);color:#f39c12}
    .entry-name{font-weight:600;font-size:15px}
    .entry-date{font-size:12px;color:rgba(255,255,255,.35);margin-left:auto}
    .entry-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 20px;font-size:13px;color:rgba(255,255,255,.65)}
    .entry-grid a{color:var(--blue);text-decoration:none}
    .entry-grid a:hover{text-decoration:underline}
    .entry-label{color:rgba(255,255,255,.35);font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:1px}
    .empty{text-align:center;padding:48px;color:rgba(255,255,255,.3);font-size:14px}

    @media(max-width:640px){
      .stats{grid-template-columns:repeat(2,1fr)}
      .entry-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>Easy Help Switzerland</h1>
    <p>Admin access only</p>
    <input type="password" id="pwdInput" placeholder="Password" autocomplete="current-password"/>
    <button id="loginBtn">Sign in</button>
    <div class="login-error" id="loginError">Wrong password. Please try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <h1>Admin Dashboard</h1>
    <button class="logout-btn" id="logoutBtn">Sign out</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="num" id="statFree">—</div><div class="lbl">Free consultations</div></div>
    <div class="stat-card"><div class="num" id="statPaid">—</div><div class="lbl">Paid bookings</div></div>
    <div class="stat-card"><div class="num" id="statPending">—</div><div class="lbl">Pending</div></div>
    <div class="stat-card"><div class="num" id="statRevenue">—</div><div class="lbl">Revenue CHF</div></div>
  </div>

  <div class="section-title">All entries (newest first)</div>
  <div id="entriesList"></div>
</div>

<script>
const login  = document.getElementById('loginScreen');
const dash   = document.getElementById('dashboard');
const pwdInput = document.getElementById('pwdInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return iso; }
}

function badgeHtml(type) {
  if (type === 'free')    return '<span class="badge badge-free">Free consultation</span>';
  if (type === 'paid')    return '<span class="badge badge-paid">Paid booking</span>';
  if (type === 'pending') return '<span class="badge badge-pending">Pending</span>';
  return '';
}

function renderEntries(entries) {
  const list = document.getElementById('entriesList');
  if (!entries.length) { list.innerHTML = '<div class="empty">No entries yet.</div>'; return; }
  list.innerHTML = entries.map(e => {
    const fields = [
      ['Email',    e.email    ? `<a href="mailto:${e.email}">${e.email}</a>` : '—'],
      ['Phone',    e.phone    || '—'],
      ['Location', e.location || e.city || '—'],
      ['Package',  e.package  || e.topic || '—'],
      ['Format',   e.preferred || '—'],
      ['Message',  e.message  || '—'],
    ];
    return `<div class="entry-card">
      <div class="entry-header">
        ${badgeHtml(e._type)}
        <span class="entry-name">${e.name || '—'}</span>
        <span class="entry-date">${fmtDate(e.created_at)}</span>
      </div>
      <div class="entry-grid">
        ${fields.map(([l,v]) => `<div><div class="entry-label">${l}</div><div>${v}</div></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

async function loadDashboard() {
  try {
    const r = await fetch('/api/admin-entries');
    if (!r.ok) throw new Error();
    const { stats, entries } = await r.json();
    document.getElementById('statFree').textContent    = stats.consultations;
    document.getElementById('statPaid').textContent    = stats.paid;
    document.getElementById('statPending').textContent = stats.pending;
    document.getElementById('statRevenue').textContent = 'CHF ' + stats.revenue;
    renderEntries(entries);
  } catch {
    document.getElementById('entriesList').innerHTML = '<div class="empty">Could not load entries.</div>';
  }
}

async function checkAuth() {
  const r = await fetch('/api/admin-auth');
  return r.ok;
}

async function init() {
  if (await checkAuth()) {
    login.style.display = 'none';
    dash.style.display  = 'block';
    loadDashboard();
  }
}

loginBtn.addEventListener('click', async () => {
  loginError.style.display = 'none';
  loginBtn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/admin-auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pwdInput.value }),
    });
    if (!r.ok) { loginError.style.display = 'block'; loginBtn.textContent = 'Sign in'; return; }
    login.style.display = 'none';
    dash.style.display  = 'block';
    loadDashboard();
  } catch {
    loginError.style.display = 'block';
    loginBtn.textContent = 'Sign in';
  }
});

pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin-auth', { method: 'DELETE' });
  dash.style.display  = 'none';
  login.style.display = 'flex';
  pwdInput.value = '';
});

init();
</script>
</body>
</html>
